name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m unittest discover -s tests -v
      - run: ruff check api.py biodietix.py utils tests scripts
      - run: ruff format --check api.py utils/api_auth.py utils/api_config.py utils/api_security.py tests scripts
      - run: python -m compileall -q api.py biodietix.py utils tests scripts
      - run: python -m scripts.validate_dataset BioDietix_CLEAN.csv
      - run: python -m pip check

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug --flavor dev --dart-define=FLAVOR=dev

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install pip-audit==2.10.1
      - run: pip-audit -r requirements-api.txt
      - run: pip-audit -r requirements-web.txt

  firebase-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx --yes firebase-tools@15.22.3 emulators:exec --only firestore,storage --project demo-biodietix "true"

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t biodietix-api:ci .
      - run: docker build -f Dockerfile.web -t biodietix-web:ci .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
